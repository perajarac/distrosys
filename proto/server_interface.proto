syntax = "proto3";

message Body {
  int32 id = 1;
  int32 m = 2;
  double x = 3;
  double y = 4;
  double z = 5;
  double vx = 6;
  double vy = 7;
  double vz = 8;
}

message Task {
  string task_name = 1;

  int32 task_id = 2;

  int64 l_time = 3;

  int64 delta_time = 4;

  int64 iteration = 5;

  int64 wait_period = 6;
}

message BodyRow {
  repeated Body body = 1;
}

message BagArg {
  Task t = 1;

  int32 NUM = 2;

  int32 n = 3;

  int32 m = 4;

  int32 cnt = 5;

  int32 next = 6;

  int64 start = 7;
}

message BagRet {
  repeated BodyRow result = 1;
  repeated TaskRet task_ret = 2;
}

message Field {
  int64 serial_version_uid = 1;

  double GAMA = 2;

  int64 iteration = 3;

  int64 time = 4;

  int64 interval = 5;

  repeated Body coordinates = 6;

  repeated int32 indexes = 7;
}

message TaskRet {
  int64 serial_version_uid = 1;

  enum Status {
    OK = 0;
    NOK = 1;
  };
  Status status = 2;

  int64 id = 3;

  int64 l_time_created = 4;
  int64 l_time = 5;

  int64 src_id = 6;
  int64 src_port = 7;

  int64 dst_id = 8;
  int32 dst_port = 9;

  Field data = 10;
}

service Executor {
  rpc SendBagTask (BagArg) returns (BagRet);
}