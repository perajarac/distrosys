syntax = "proto3";

package distrosys;

option java_multiple_files = true;
option java_package = "ac.rs.bg.etf.proto";

// Aligned with rs.ac.bg.etf.kdp.simulation.io.SimulationType
enum SimulationType {
  SIMULATION_TYPE_UNSPECIFIED = 0;
  OPTIMISTIC = 1;
  SINGLETHREAD = 2;
  MULTITHREAD = 3;
}

enum JobStatus {
  JOB_STATUS_UNSPECIFIED = 0;
  READY = 1;
  SCHEDULED = 2;
  RUNNING = 3;
  DONE = 4;
  FAILED = 5;
  ABORTED = 6;
}

enum SubJobStatus {
  SUB_JOB_STATUS_UNSPECIFIED = 0;
  SUB_JOB_PENDING = 1;
  SUB_JOB_RUNNING = 2;
  SUB_JOB_DONE = 3;
  SUB_JOB_FAILED = 4;
}

// Mirror of Event routing fields from simulation-core (payload in workstation_interface.proto)
message SimEvent {
  int64 id = 1;
  int32 status = 2;
  int64 l_time_created = 3;
  int64 l_time = 4;
  int64 src_id = 5;
  int32 src_port = 6;
  int64 dst_id = 7;
  int32 dst_port = 8;
}

message ComponentState {
  int64 component_id = 1;
  repeated string state_values = 2;
}
